<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
    body {
      background-image: url("https://www.catholicmom.com/hubfs/20230802%20CAstfalk%201.png");
      background-size: cover
    }
  </style>
</head>

<body>
    <div class="container text-center text-white bg-dark fs-2 py-4">
        Guess the words!
    </div>
    <br>
    <div class="container">
        <a href="/" type="button" class="btn btn-link text-white col-1">
            GO BACK
        </a>
    <form method="post">
        </div>
        <div class="d-flex align-items-center flex-column">
                {%for i in shuffled%}
                    <div class="card text-center m-2 bg-light">
                        <div class="card-body">
                            {{i['word']}}
                            <br>
                            <input placeholder="Answer" name="{{i[id]}}" class="form-control">
                        </div>
                    </div>
                {%endfor%}
                <button type="button" class="btn btn-danger col-1">
                    Submit
                </button>
        </div>
    </form>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
