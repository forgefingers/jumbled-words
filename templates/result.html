<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        body {
            background-image: url("https://www.catholicmom.com/hubfs/20230802%20CAstfalk%201.png");
            background-size: cover
        }
    </style>
</head>

<body>
    <div class="container h1 text-center bg-dark text-white p-5">
        Check out your results!
    </div>
    <br>
    <div class="container h1 text-center bg-dark text-white p-3">
        You got {{score}}/{{correctanswers|length}} correct!
    </div>
    <br>
    <div class="container">
        <table class="table">
            <thead>
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Correct Word</th>
                    <th scope="col">Your Answer</th>
                </tr>
            </thead>
            <tbody>
                {%for i in correctanswers%}
                <tr>
                    <th scope="row">{{loop.index}}</th>
                    <td>{{i}}</td>
                    <td class="{{'text-success' if useranswers[loop.index-1]==i else 'text-danger'}}">
                        {{useranswers[loop.index-1]}}</td>
                </tr>
                {%endfor%}
            </tbody>
        </table>
        <div class="d-flex justify-content-between">
            <a class="btn btn-danger" href="/" role="button">HOME</a>
            <a class="btn btn-danger" href="/play" role="button">PLAY AGAIN</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
